<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joshua Barnhart</title>
    <script>
      const storedDarkmodePref = localStorage.getItem("darkmode");

      // No stored preference for darkmode found
      if (!storedDarkmodePref) {
        const sysDarkmodePref = window.matchMedia(
          "(prefers-color-scheme: dark)"
        );
        if (sysDarkmodePref.matches) {
          document.documentElement.classList.add("dark");
        }
      } else {
        // Use the stored preference
        if (storedDarkmodePref === "true") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      }
    </script>
  </head>
  <body
    class="bg-neutral-50 dark:bg-zinc-900 text-neutral-950 dark:text-neutral-50"
  >
    <div
      id="root"
      class="relative grid gap-y-5 md:gap-y-8 lg:gap-y-12 h-screen w-screen overflow-y-scroll"
    ></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
